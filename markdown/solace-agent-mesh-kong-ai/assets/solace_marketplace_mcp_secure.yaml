          paths:
            /:
              get:
                summary: Root endpoint
                description: Returns the name of the API.
                responses:
                  '200':
                    description: API name
                    content:
                      application/json:
                        schema:
                          type: object
                          properties:
                            name:
                              type: string
                              example: Sample Users API
                        examples:
                          root:
