_format_version: "3.0"
routes:
  - name: mcp-listener-route
    paths:
    - /mcp-listener
    plugins:
      - name: ai-mcp-proxy
        instance_name: marketplace-listener
        enabled: true
        config:
          mode: listener
          server:
            tag: mcp-tools
            timeout: 45000
          max_request_body_size: 32768
      - name: ai-mcp-oauth2
        enabled: true
        config:
          resource: ${{ env "DECK_MCP_AUTH_URL" }}
          authorization_servers:
          - ${{ env "DECK_KONG_IDENTITY_AUTHZ_URL" }}
          introspection_endpoint: ${{ env "DECK_KONG_IDENTITY_INTROSPECTION_URL" }}
          client_id: ${{ env "DECK_CLIENT_ID" }}
          client_secret: ${{ env "DECK_CLIENT_SECRET" }}
          insecure_relaxed_audience_validation: true
services:
- name: ai-proxy-advanced-service
  host: localhost
  port: 32000
  routes:
  - name: route1
    paths:
    - /llm-route/v1/chat/completions
    plugins:
    - name: ai-proxy-advanced
      instance_name: "ai-proxy-llm"
      config:
        genai_category: text/generation
        llm_format: openai
        max_request_body_size: 1048576
        model_name_header: true
        response_streaming: allow
        targets:
        - route_type: "llm/v1/chat"
          model:
            provider: "openai"
            options:
              upstream_url: ${{ env "DECK_LLM_BACK_END_URL" }}            
    - name: pre-function
      instance_name: ai-pre-transform-llm    
      config:
        access:
        - |-
          local function transform_payload(data)
            if data.messages then
              for i, message in ipairs(data.messages) do
                if message.role == "system" and type(message.content) == "table" then
                  if #message.content == 1 and message.content[1].type == "text" then
                    message.content = message.content[1].text
                  end
                end
              end
            end
            return data
          end
          local body = kong.request.get_body()
          if body and type(body) == "table" then
            local transformed = transform_payload(body)
            kong.service.request.set_body(transformed)
          end
- name: marketplace
  url: http://localhost:32000
  routes:
  - name: marketplace-route
    paths:
    - /
    plugins:
    - name: ai-mcp-proxy
      instance_name: marketplace-mcp
      enabled: true
      tags:
      - mcp-tools
      config:
        mode: conversion-only
        tools:
        - description: Get users
          method: GET
          parameters:
          - description: Optional user ID
            in: query
            name: id
            required: false
            schema:
              type: string
          path: /users
        - description: Get orders of a given user
          method: GET
          parameters:
          - description: User ID to filter orders
            in: path
            name: userId
            required: true
            schema:
              type: string
          path: /users/{userId}/orders
        - description: Get orders 
          method: GET
          path: /orders

    - name: mocking
      instance_name: marketplace-mock
      enabled: true
      config:
        api_specification: |-
          openapi: 3.0.0
          info:
            title: Sample Users API
            version: 1.1.0
            description: A sample API for managing users and orders in a mock marketplace.
          servers:
